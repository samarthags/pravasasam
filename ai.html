<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MP3 Drop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0c0c0f;
      --card:   #13131a;
      --border: #1f1f2e;
      --accent: #ff3c5f;
      --accent2:#ff7043;
      --text:   #f0f0f0;
      --muted:  #50505a;
      --mono:   'DM Mono', monospace;
      --display:'Bebas Neue', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(255,60,95,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 50%, rgba(255,112,67,0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .page {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 20px;
    }
    .brand {
      font-family: var(--display);
      font-size: clamp(3.5rem, 14vw, 7rem);
      letter-spacing: 0.04em; line-height: 1;
      background: linear-gradient(135deg, #ff3c5f 0%, #ff7043 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px;
      animation: fadeDown 0.5s ease both;
    }
    .tagline {
      font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 48px;
      animation: fadeDown 0.5s 0.08s ease both;
    }
    .card {
      width: 100%; max-width: 520px;
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 32px;
      animation: fadeUp 0.5s 0.12s ease both;
    }
    .card-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--muted); margin-bottom: 12px; }
    .input-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .url-input {
      flex: 1; min-width: 0;
      background: #0a0a10; border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: var(--mono); font-size: 0.78rem;
      padding: 13px 16px; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,60,95,0.1); }
    .url-input.shake { animation: shake 0.35s ease; border-color: var(--accent); }
    .go-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px; color: #fff;
      font-family: var(--display); font-size: 1.1rem; letter-spacing: 0.06em;
      padding: 0 22px; cursor: pointer; flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    .go-btn:hover:not(:disabled) { opacity: 0.88; }
    .go-btn:active:not(:disabled) { transform: scale(0.97); }
    .go-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
    .chip {
      font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px;
    }
    #status { display: none; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    #status.show { display: flex; }
    .prog-bg { background: var(--border); border-radius: 999px; height: 3px; overflow: hidden; }
    .prog-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%; transition: width 0.4s ease;
    }
    .prog-fill.indeterminate { width: 40%; animation: slide 1.2s ease-in-out infinite; }
    .status-text { font-size: 0.7rem; color: var(--muted); }
    .status-text.ok  { color: #50e080; }
    .status-text.err { color: var(--accent); }
    #result {
      display: none; align-items: center; gap: 14px;
      background: rgba(80,224,128,0.05); border: 1px solid rgba(80,224,128,0.15);
      border-radius: 10px; padding: 14px 16px;
      animation: fadeUp 0.3s ease both;
    }
    #result.show { display: flex; }
    .result-info { flex: 1; overflow: hidden; }
    #result-title { font-size: 0.82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #result-sub   { font-size: 0.62rem; color: var(--muted); margin-top: 2px; }
    .dl-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 8px; color: #fff;
      font-family: var(--display); font-size: 0.9rem; letter-spacing: 0.05em;
      padding: 9px 18px; cursor: pointer; flex-shrink: 0;
      transition: opacity 0.15s; text-decoration: none; display: inline-block;
    }
    .dl-btn:hover { opacity: 0.85; }
    .instance-line { font-size: 0.58rem; color: var(--muted); margin-top: 10px; text-align: center; }
    .dot-ok { color: #50e080; }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(14px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}   60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
    }
    @keyframes slide { 0%{margin-left:-40%} 100%{margin-left:100%} }
    @keyframes spin  { to{transform:rotate(360deg)} }
    .spin {
      display: inline-block; width: 11px; height: 11px;
      border: 2px solid rgba(255,255,255,0.25); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle;
    }
    .foot { margin-top: 18px; font-size: 0.58rem; color: var(--muted); text-align: center; line-height: 1.8; }
    .foot a { color: #555; text-decoration: none; }
  </style>
</head>
<body>
<div class="page">

  <div class="brand">MP3 DROP</div>
  <div class="tagline">Paste a link · Get your MP3</div>

  <div class="card">
    <div class="card-label">YouTube or Spotify Link</div>

    <div class="input-row">
      <input class="url-input" id="url-input" type="text"
        placeholder="youtube.com/watch?v=... or open.spotify.com/track/..."
        autocomplete="off" spellcheck="false"
        onkeydown="if(event.key==='Enter') convert()" />
      <button class="go-btn" id="go-btn" onclick="convert()">GET MP3</button>
    </div>

    <div class="chips">
      <span class="chip">▶ YouTube</span>
      <span class="chip">🎵 Spotify</span>
      <span class="chip">☁ SoundCloud</span>
      <span class="chip">Free · No signup</span>
    </div>

    <div id="status">
      <div class="prog-bg"><div class="prog-fill" id="prog"></div></div>
      <div class="status-text" id="status-text">Working…</div>
    </div>

    <div id="result">
      <div class="result-info">
        <div id="result-title">Your Track</div>
        <div id="result-sub">MP3 · 320kbps · Ready</div>
      </div>
      <a class="dl-btn" id="dl-link" href="#" target="_blank" rel="noopener">↓ MP3</a>
    </div>

    <div class="instance-line" id="instance-line"></div>
  </div>

  <div class="foot">
    Uses <a href="https://cobalt.tools" target="_blank">cobalt</a> community instances · Personal use only
  </div>

</div>
<script>
// ── No-auth cobalt community instances ────────────────────────────────────
// These instances have auth:false and cors:true (from instances.cobalt.best)
// The page tries each in order and falls back automatically on auth errors or timeouts.
const INSTANCES = [
  "https://cobalt.ayo.wtf",
  "https://cobalt.seitan.de",
  "https://cobalt.uuid.monster",
  "https://cobalt.perennialte.ch",
  "https://cobalt.darkness.services",
  "https://cobalt.privacyredirect.com",
  "https://co.wuk.sh",
  "https://cobalt.syntheticbird.net",
  "https://cobalt.catvibers.me",
  "https://cobalt.lunar.icu",
];

async function convert() {
  const input = document.getElementById("url-input");
  const url   = input.value.trim();

  if (!url) {
    input.classList.add("shake");
    setTimeout(() => input.classList.remove("shake"), 400);
    return;
  }

  setLoading(true);
  hideResult();

  let lastError = "All servers are busy. Please try again in a moment.";

  for (let i = 0; i < INSTANCES.length; i++) {
    const instance = INSTANCES[i];
    setStatus(`Connecting… (${i + 1}/${INSTANCES.length})`);

    try {
      const data = await cobaltRequest(instance, url);

      if (data.status === "error") {
        const code = data.error?.code || "";
        // Auth error = silently try next instance
        if (code.includes("auth")) { lastError = code; continue; }
        // Bad URL or unsupported = surface immediately, no point retrying
        throw new Error(friendlyError(code));
      }

      if (data.status === "redirect" || data.status === "tunnel") {
        showResult(data.url, url, instance);
        setLoading(false);
        return;
      }

      if (data.status === "picker" && data.picker?.length) {
        const audio = data.picker.find(p => p.type === "audio") || data.picker[0];
        showResult(audio.url, url, instance);
        setLoading(false);
        return;
      }

      // Unknown good status — skip
      lastError = "Unexpected response, trying next server…";

    } catch (err) {
      // Network/timeout = try next
      if (err.name === "AbortError" || err.name === "TypeError") {
        lastError = "Server timeout, trying next…";
        continue;
      }
      // App-level error = stop and tell user
      setError(err.message);
      return;
    }
  }

  setError(lastError);
}

async function cobaltRequest(baseUrl, url) {
  const ctrl    = new AbortController();
  const timeout = setTimeout(() => ctrl.abort(), 9000);

  try {
    const res = await fetch(baseUrl, {
      method: "POST",
      signal: ctrl.signal,
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify({
        url,
        downloadMode:  "audio",
        audioFormat:   "mp3",
        audioBitrate:  "320",
        filenameStyle: "pretty",
      }),
    });

    clearTimeout(timeout);

    // Treat 401/403 as auth error → skip instance
    if (res.status === 401 || res.status === 403) {
      return { status: "error", error: { code: "error.api.auth.jwt.missing" } };
    }

    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      return { status: "error", error: { code: body?.error?.code || `http_${res.status}` } };
    }

    return res.json();

  } finally {
    clearTimeout(timeout);
  }
}

function showResult(downloadUrl, originalUrl, instance) {
  const host = (() => { try { return new URL(instance).hostname; } catch { return instance; } })();

  document.getElementById("result-title").textContent = guessTitle(originalUrl);
  document.getElementById("result-sub").textContent   = "MP3 · 320kbps · Ready";
  document.getElementById("dl-link").href             = downloadUrl;
  document.getElementById("result").classList.add("show");
  document.getElementById("instance-line").innerHTML  =
    `<span class="dot-ok">●</span> via ${host}`;

  // Auto-start download
  const a = document.createElement("a");
  a.href = downloadUrl; a.download = "track.mp3";
  a.target = "_blank"; a.rel = "noopener";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function guessTitle(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes("spotify"))                              return "Spotify Track";
    if (u.hostname.includes("youtube") || u.hostname.includes("youtu.be")) return "YouTube Audio";
    if (u.hostname.includes("soundcloud"))                           return "SoundCloud Track";
  } catch {}
  return "Your Track";
}

function setLoading(active) {
  const btn = document.getElementById("go-btn");
  const prog = document.getElementById("prog");
  btn.disabled = active;
  document.getElementById("status").classList.toggle("show", active);
  if (active) {
    btn.innerHTML = `<span class="spin"></span>`;
    prog.classList.add("indeterminate"); prog.style.width = "0%";
  } else {
    btn.textContent = "GET MP3";
    prog.classList.remove("indeterminate"); prog.style.width = "100%";
  }
}

function setStatus(msg, type = "") {
  const el = document.getElementById("status-text");
  el.textContent = msg; el.className = "status-text " + type;
  document.getElementById("status").classList.add("show");
}

function setError(msg) {
  setLoading(false);
  document.getElementById("go-btn").textContent = "GET MP3";
  document.getElementById("prog").style.width = "0%";
  document.getElementById("prog").classList.remove("indeterminate");
  setStatus("⚠ " + msg, "err");
}

function hideResult() {
  document.getElementById("result").classList.remove("show");
  document.getElementById("instance-line").innerHTML = "";
}

function friendlyError(code) {
  const map = {
    "error.api.link.invalid":        "That link isn't supported. Try a YouTube or Spotify URL.",
    "error.api.link.unsupported":    "This platform isn't supported.",
    "error.api.content.unavailable": "This content isn't available.",
    "error.api.content.private":     "This content is private.",
    "error.api.youtube.decipher":    "YouTube blocked this. Try a different track.",
    "error.api.rate_exceeded":       "Rate limit hit — wait a moment and retry.",
  };
  return map[code] || (code ? code.replace(/error\.(api\.)?/, "") : "Something went wrong");
}

// Ctrl+V shortcut focuses the input
document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "v")
    document.getElementById("url-input").focus();
});
</script>
</body>
</html>
