<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sarvam AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1c1c1e;
    --bg2: #2c2c2e;
    --bg3: #3a3a3c;
    --surface: #2c2c2e;
    --surface2: #3a3a3c;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.13);
    --accent: #e8855a;
    --accent2: #d4704a;
    --text: #f5f5f0;
    --text2: #ababab;
    --text3: #636366;
    --radius: 22px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html { height: 100%; }
  body {
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 700px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 12px;
    flex-shrink: 0;
  }

  .hdr-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: none; color: var(--text);
    cursor: pointer; border-radius: 10px;
    transition: background 0.15s;
  }
  .hdr-btn:hover { background: var(--surface); }

  .header-center {
    display: flex; align-items: center; gap: 5px;
    cursor: pointer; padding: 6px 10px; border-radius: 10px;
    transition: background 0.15s;
  }
  .header-center:hover { background: var(--surface); }
  .header-title {
    font-family: 'Inter', sans-serif;
    font-size: 17px; font-weight: 500;
    color: var(--text); letter-spacing: -0.3px;
  }
  .chevron { color: var(--text3); font-size: 11px; }

  /* MESSAGES */
  .messages-wrap {
    flex: 1; overflow-y: auto;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .messages-wrap::-webkit-scrollbar { width: 0; }

  /* WELCOME */
  .welcome {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 48px 28px 24px;
    min-height: 56vh; gap: 0;
  }

  .welcome-star {
    width: 54px; height: 54px; margin-bottom: 30px;
    animation: starIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes starIn {
    from { transform: scale(0.5) rotate(-15deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .greeting {
    font-family: 'Lora', Georgia, serif;
    font-size: clamp(26px, 7vw, 36px);
    font-weight: 600; line-height: 1.25;
    letter-spacing: -0.4px; color: var(--text);
    margin-bottom: 32px;
    animation: fadeUp 0.45s 0.1s both cubic-bezier(0.16,1,0.3,1);
  }
  .greeting em { font-style: italic; font-weight: 400; }

  @keyframes fadeUp {
    from { transform: translateY(14px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .suggestions {
    display: flex; flex-direction: column; gap: 9px;
    width: 100%; max-width: 400px;
    animation: fadeUp 0.45s 0.18s both cubic-bezier(0.16,1,0.3,1);
  }
  .sug {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 13px; padding: 13px 16px;
    text-align: left; color: var(--text2);
    font-size: 14px; cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    line-height: 1.45; font-family: 'Inter', sans-serif;
  }
  .sug:hover { background: var(--surface2); color: var(--text); border-color: rgba(255,255,255,0.18); }
  .sug:active { opacity: 0.7; }

  /* MSG LIST */
  .msg-list { padding: 16px 16px 8px; display: flex; flex-direction: column; gap: 2px; }

  .message { animation: msgIn 0.3s cubic-bezier(0.16,1,0.3,1); }
  @keyframes msgIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* AI — no bubble, just prose */
  .msg-ai { display: flex; gap: 12px; align-items: flex-start; padding: 10px 2px; }
  .ai-ico { width: 26px; height: 26px; flex-shrink: 0; margin-top: 3px; }
  .ai-ico svg { width: 26px; height: 26px; }
  .ai-body {
    font-size: 15.5px; color: var(--text);
    line-height: 1.72; flex: 1;
  }
  .ai-body p { margin-bottom: 10px; }
  .ai-body p:last-child { margin-bottom: 0; }
  .ai-body code { background: var(--surface2); padding: 1px 5px; border-radius: 5px; font-size: 13px; font-family: monospace; }
  .ai-body pre { background: var(--bg2); border-radius: 12px; padding: 14px 16px; overflow-x: auto; margin: 10px 0; border: 1px solid var(--border); }
  .ai-body pre code { background: none; padding: 0; font-size: 12.5px; }
  .ai-body strong { font-weight: 600; }
  .ai-body ul, .ai-body ol { margin: 6px 0 8px 18px; }
  .ai-body li { margin-bottom: 3px; }

  /* User — pill */
  .msg-user { display: flex; justify-content: flex-end; padding: 4px 2px; }
  .user-pill {
    background: var(--surface2); border-radius: 20px 20px 4px 20px;
    padding: 11px 17px; max-width: 80%;
    font-size: 15.5px; color: var(--text); line-height: 1.55; word-break: break-word;
  }

  /* TYPING */
  .typing-row { display: flex; gap: 12px; align-items: flex-start; padding: 10px 2px; }
  .typing-dots { display: flex; gap: 5px; align-items: center; padding: 7px 0; }
  .tdot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); animation: tdot 1.3s ease-in-out infinite; }
  .tdot:nth-child(2) { animation-delay: 0.18s; }
  .tdot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes tdot { 0%,60%,100%{transform:scale(1);opacity:.35} 30%{transform:scale(1.35);opacity:1} }

  .cursor { display: inline-block; width: 2px; height: 15px; background: var(--text2); margin-left: 1px; vertical-align: middle; animation: blink .85s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* INPUT */
  .input-area {
    flex-shrink: 0;
    padding: 8px 16px calc(16px + var(--safe-bottom));
  }
  .input-box {
    background: var(--surface); border-radius: var(--radius);
    padding: 14px 16px 12px; border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .input-box:focus-within { border-color: rgba(255,255,255,0.2); }
  .input-box textarea {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 16px; line-height: 1.5; resize: none;
    min-height: 24px; max-height: 140px; display: block;
    caret-color: var(--accent);
  }
  .input-box textarea::placeholder { color: var(--text3); }

  .input-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px;
  }
  .icon-btns { display: flex; gap: 2px; }
  .ico {
    width: 34px; height: 34px; border-radius: 10px;
    background: none; border: none; color: var(--text3);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color .15s, background .15s;
  }
  .ico:hover { color: var(--text2); background: var(--surface2); }

  .send {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent2); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .1s, opacity .15s;
    opacity: 0.3;
  }
  .send.on { opacity: 1; }
  .send:active { transform: scale(0.9); }
  .send:disabled { opacity: 0.2; cursor: not-allowed; }

  /* MODEL SHEET */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
    display: none; align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--bg2); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 700px; margin: 0 auto;
    padding: 22px 18px calc(28px + var(--safe-bottom));
    animation: shUp 0.28s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes shUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .sheet-hdg {
    font-family: 'Lora', serif; font-size: 18px; font-weight: 600;
    margin-bottom: 14px; color: var(--text);
  }
  .mopt {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-radius: 13px; margin-bottom: 7px;
    background: var(--surface); cursor: pointer;
    transition: background .15s; border: 1px solid transparent;
  }
  .mopt:hover { background: var(--surface2); }
  .mopt.sel { border-color: var(--accent); }
  .mopt-name { font-weight: 500; font-size: 15px; }
  .mopt-desc { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .mcheck { color: var(--accent); font-size: 17px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 95px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface2); color: var(--text2);
    padding: 9px 18px; border-radius: 20px;
    font-size: 13px; opacity: 0; pointer-events: none;
    transition: all 0.28s; z-index: 200; white-space: nowrap;
  }
  .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* SCROLL FAB */
  .sfab {
    position: fixed; bottom: 88px; right: 18px;
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text2); cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 10;
  }
  .sfab.on { opacity: 1; pointer-events: auto; }

  @media (max-width: 480px) {
    .greeting { font-size: 25px; }
    .user-pill { max-width: 88%; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <button class="hdr-btn" onclick="toast('Sidebar coming soon')">
      <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
        <rect width="20" height="2" rx="1" fill="currentColor"/>
        <rect y="6" width="13" height="2" rx="1" fill="currentColor"/>
        <rect y="12" width="20" height="2" rx="1" fill="currentColor"/>
      </svg>
    </button>

    <div class="header-center" onclick="openSheet()">
      <span class="header-title" id="mLabel">sarvam-30b</span>
      <span class="chevron">▾</span>
    </div>

    <button class="hdr-btn" onclick="clearChat()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="10" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
  </header>

  <!-- SCROLL AREA -->
  <div class="messages-wrap" id="wrap">
    <!-- WELCOME -->
    <div class="welcome" id="welcome">
      <svg class="welcome-star" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="28" y1="4" x2="28" y2="52" stroke="#e8855a" stroke-width="3.6" stroke-linecap="round"/>
        <line x1="4" y1="28" x2="52" y2="28" stroke="#e8855a" stroke-width="3.6" stroke-linecap="round"/>
        <line x1="10.06" y1="10.06" x2="45.94" y2="45.94" stroke="#e8855a" stroke-width="3.6" stroke-linecap="round"/>
        <line x1="45.94" y1="10.06" x2="10.06" y2="45.94" stroke="#e8855a" stroke-width="3.6" stroke-linecap="round"/>
        <line x1="6.27" y1="18" x2="49.73" y2="38" stroke="#e8855a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
        <line x1="49.73" y1="18" x2="6.27" y2="38" stroke="#e8855a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
        <line x1="18" y1="6.27" x2="38" y2="49.73" stroke="#e8855a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
        <line x1="38" y1="6.27" x2="18" y2="49.73" stroke="#e8855a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      </svg>

      <div class="greeting" id="greet">How can I help you<br><em>this morning?</em></div>

      <div class="suggestions">
        <button class="sug" onclick="pick('What are the major festivals of India and their significance?')">What are the major festivals of India and their significance?</button>
        <button class="sug" onclick="pick('Explain the concept of karma from the Bhagavad Gita simply')">Explain karma from the Bhagavad Gita in simple terms</button>
        <button class="sug" onclick="pick('Translate &quot;The stars are beautiful tonight&quot; to Hindi and Tamil')">Translate a sentence to Hindi and Tamil</button>
        <button class="sug" onclick="pick('Write a short poem in Hindi about the monsoon season')">Write a short Hindi poem about monsoon</button>
      </div>
    </div>

    <div class="msg-list" id="msgs"></div>
  </div>

  <button class="sfab" id="sfab" onclick="scrollBot()">↓</button>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-box">
      <textarea id="ta" placeholder="Chat with Sarvam…" rows="1" oninput="onIn(this)" onkeydown="onKd(event)"></textarea>
      <div class="input-row">
        <div class="icon-btns">
          <button class="ico">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <button class="ico">
            <svg width="18" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
        </div>
        <button class="send" id="sb" onclick="go()" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MODEL SHEET -->
<div class="overlay" id="overlay" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-hdg">Choose model</div>
    <div id="mlist"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toastEl"></div>

<script>
const KEY = 'sk_9efjlgwf_O4gtknRFr7dTiN3CLxMVtgXF';
const URL = 'https://api.sarvam.ai/v1/chat/completions';
const MODELS = [
  { id:'sarvam-30b',  name:'sarvam-30b',  desc:'Balanced · 30B · 64K context' },
  { id:'sarvam-105b', name:'sarvam-105b', desc:'Most capable · 105B · 128K context' },
  { id:'sarvam-m',    name:'sarvam-m',    desc:'Legacy · 24B · Hybrid reasoning' },
];
let mi = 0, hist = [], busy = false;

const wrap = document.getElementById('wrap');
const msgs = document.getElementById('msgs');
const ta   = document.getElementById('ta');
const sb   = document.getElementById('sb');
const sfab = document.getElementById('sfab');
const wel  = document.getElementById('welcome');

// greeting
(function(){
  const h = new Date().getHours();
  const t = h<12?'morning':h<17?'afternoon':'evening';
  document.getElementById('greet').innerHTML = `How can I help you<br><em>this ${t}?</em>`;
})();

// scroll fab
wrap.addEventListener('scroll', () => {
  const away = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight > 90;
  sfab.classList.toggle('on', away && msgs.children.length > 0);
});
function scrollBot(s=true){ wrap.scrollTo({top:wrap.scrollHeight, behavior:s?'smooth':'instant'}); }

// input
function onIn(el){
  el.style.height='auto';
  el.style.height = Math.min(el.scrollHeight,140)+'px';
  const ok = el.value.trim().length>0 && !busy;
  sb.disabled = !ok; sb.classList.toggle('on', ok);
}
function onKd(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();} }

// suggestion
function pick(txt){ ta.value=txt; onIn(ta); go(); }

// clear
function clearChat(){
  hist=[]; msgs.innerHTML='';
  wel.style.display='';
  ta.value=''; ta.style.height='auto';
  sb.disabled=true; sb.classList.remove('on');
}

// add user msg
function addUser(txt){
  wel.style.display='none';
  const d=document.createElement('div');
  d.className='message';
  d.innerHTML=`<div class="msg-user"><div class="user-pill">${esc(txt).replace(/\n/g,'<br>')}</div></div>`;
  msgs.appendChild(d); scrollBot();
}

// typing
function addTyping(){
  const d=document.createElement('div');
  d.className='message'; d.id='typ';
  d.innerHTML=`<div class="typing-row"><div class="ai-ico">${star()}</div><div class="typing-dots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>`;
  msgs.appendChild(d); scrollBot();
}

// ai message with stream
function addAI(txt){
  document.getElementById('typ')?.remove();
  const d=document.createElement('div');
  d.className='message';
  d.innerHTML=`<div class="msg-ai"><div class="ai-ico">${star()}</div><div class="ai-body" id="live"></div></div>`;
  msgs.appendChild(d);
  const t=d.querySelector('#live'); t.removeAttribute('id');
  const cur=document.createElement('span'); cur.className='cursor'; t.appendChild(cur);
  let i=0;
  function tick(){
    if(i<txt.length){
      cur.insertAdjacentText('beforebegin',txt[i++]);
      scrollBot();
      const ch=txt[i-1]; const dl=['.','!','?'].includes(ch)?42:ch==='\n'?28:13;
      setTimeout(tick,dl);
    } else { cur.remove(); t.innerHTML=md(txt); }
  }
  tick();
}

// send
async function go(){
  const txt=ta.value.trim(); if(!txt||busy) return;
  busy=true; sb.disabled=true; sb.classList.remove('on');
  ta.value=''; ta.style.height='auto';
  hist.push({role:'user',content:txt});
  addUser(txt); addTyping();
  try{
    const r=await fetch(URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','api-subscription-key':KEY},
      body:JSON.stringify({
        model:MODELS[mi].id,
        messages:[
          {role:'system',content:'You are Sarvam, an intelligent AI assistant by Sarvam AI. You speak English and all major Indian languages — Hindi, Tamil, Telugu, Kannada, Malayalam, Bengali, Gujarati, Marathi, Punjabi, Odia. Mirror the user\'s language. Be warm, accurate, concise.'},
          ...hist
        ],
        temperature:0.7, max_tokens:1200
      })
    });
    if(!r.ok){const e=await r.json().catch(()=>({})); throw new Error(e.error?.message||`Error ${r.status}`);}
    const data=await r.json();
    const rep=data.choices?.[0]?.message?.content||'No response.';
    hist.push({role:'assistant',content:rep});
    addAI(rep);
  }catch(e){
    document.getElementById('typ')?.remove(); hist.pop();
    toast('⚠ '+(e.message||'Something went wrong'));
  }finally{
    busy=false; ta.focus();
  }
}

// model sheet
function openSheet(){
  const el=document.getElementById('mlist');
  el.innerHTML=MODELS.map((m,i)=>`
    <div class="mopt ${i===mi?'sel':''}" onclick="selModel(${i})">
      <div><div class="mopt-name">${m.name}</div><div class="mopt-desc">${m.desc}</div></div>
      ${i===mi?'<span class="mcheck">✓</span>':''}
    </div>`).join('');
  document.getElementById('overlay').classList.add('open');
}
function closeSheet(e){ if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open'); }
function selModel(i){
  mi=i; document.getElementById('mLabel').textContent=MODELS[i].name;
  document.getElementById('overlay').classList.remove('open');
  toast('Model: '+MODELS[i].name);
}

// helpers
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function md(t){
  return esc(t)
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`\n]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<p><strong>$1</strong></p>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,m=>`<ul>${m}</ul>`)
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>');
}
function star(){
  return `<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="14" y1="2" x2="14" y2="26" stroke="#e8855a" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="14" x2="26" y2="14" stroke="#e8855a" stroke-width="2" stroke-linecap="round"/>
