<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPO — SGS.1</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e0e;color:#b0b0b0;font-family:'JetBrains Mono',monospace;height:100vh;display:flex;flex-direction:column}
.topbar{padding:10px 20px;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:8px;background:#111}
.dot{width:10px;height:10px;border-radius:50%;background:#2a2a2a}
.dot.g{background:#3a6a3a}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column}
.line{font-size:13px;line-height:1.9}
.line.user{color:#fff;margin-top:10px}
.line.green{color:#5a9a5a}
.line.muted{color:#555}
.input-row{display:flex;padding:10px;border-top:1px solid #222}
.prefix{color:#444}
input{flex:1;background:none;border:none;color:#ddd;outline:none}
</style>
</head>
<body>
<div class="topbar">
<div class="dot"></div><div class="dot"></div><div class="dot g"></div>
</div>
<div class="chat" id="chat"></div>
<div class="input-row">
<span class="prefix">expo ~$</span>
<input id="inp" placeholder="ask something...">
</div>
<script>
const chat=document.getElementById('chat');
const inp=document.getElementById('inp');
let busy=false;function addLine(text,cls='normal'){ const d=document.createElement('div'); d.className='line '+cls; d.innerHTML=text; chat.appendChild(d); chat.scrollTop=chat.scrollHeight; }

function send(text){ if(busy) return; busy=true; inp.disabled=true; addLine('expo ~$ '+text,'user');

setTimeout(()=>{ if(text.includes('who')){ addLine("i'm expo","green"); addLine("experimental system","muted"); } else if(text.includes('play')){ addLine('playing song...','green'); addLine('Jo Ishq Hua','muted'); } else if(text.includes('trace')){ addLine('simulation only — no real data accessed','muted'); addLine('device → android','green'); } else if(text.includes('web')){ buildPage(); } else { addLine('unknown command','muted'); }

busy=false; inp.disabled=false; inp.focus(); },500); }

inp.addEventListener('keydown',e=>{ if(e.key==='Enter' && inp.value.trim()){ send(inp.value.trim()); inp.value=''; } });

function buildPage(){ const html='<!DOCTYPE html><html><body><h1>DHOP SHOP READY</h1></body></html>'; const blob=new Blob([html],{type:'text/html'}); const url=URL.createObjectURL(blob);

const d=document.createElement('div'); d.className='line green'; d.innerHTML='<a href="'+url+'" download="shop.html">Download Shop</a>'; chat.appendChild(d);

setTimeout(()=>URL.revokeObjectURL(url),5000); }

addLine('system ready','green'); </script>

</body>
</html>
