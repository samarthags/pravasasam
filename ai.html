<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPO — SGS.1</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e0e;
    color: #b0b0b0;
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    padding: 10px 20px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #111;
    flex-shrink: 0;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #2a2a2a; }
  .dot.g { background: #3a6a3a; }
  .topbar-title { font-size: 12px; color: #444; margin-left: 10px; letter-spacing: 2px; }
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 8px;
    display: flex;
    flex-direction: column;
  }
  .chat::-webkit-scrollbar { width: 2px; }
  .chat::-webkit-scrollbar-thumb { background: #222; }
  .line {
    font-size: 13px;
    line-height: 1.9;
    animation: appear 0.1s ease;
  }
  @keyframes appear { from { opacity: 0; } to { opacity: 1; } }
  .line.dim    { color: #383838; }
  .line.user   { color: #e0e0e0; margin-top: 14px; }
  .line.muted  { color: #505050; }
  .line.normal { color: #909090; }
  .line.hi     { color: #c8c8c8; }
  .line.green  { color: #5a9a5a; }
  .line.amber  { color: #a08040; }
  .line.blue   { color: #5a80b0; }
  .line.red    { color: #9a4a4a; }
  .line.space  { height: 6px; display: block; }
  .input-row {
    display: flex;
    align-items: center;
    padding: 12px 24px;
    border-top: 1px solid #1a1a1a;
    background: #0e0e0e;
    flex-shrink: 0;
    gap: 10px;
  }
  .prefix { color: #3a3a3a; font-size: 13px; white-space: nowrap; user-select: none; }
  input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #ddd;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    caret-color: #888;
  }
  input::placeholder { color: #2a2a2a; }
</style>
</head>
<body>

<div class="topbar">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot g"></div>
  <span class="topbar-title">expo — sgs.1</span>
</div>

<div class="chat" id="chat"></div>

<div class="input-row">
  <span class="prefix">expo ~ $</span>
  <input id="inp" type="text" placeholder="ask something..." autocomplete="off" />
</div>

<script>
const chat = document.getElementById('chat');
const inp  = document.getElementById('inp');
let busy = false;

function addLine(text, cls = 'normal', delay = 0) {
  return new Promise(r => setTimeout(() => {
    const d = document.createElement('div');
    d.className = 'line ' + cls;
    d.innerHTML = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    r();
  }, delay));
}

function gap(delay = 0) {
  return new Promise(r => setTimeout(() => {
    const d = document.createElement('span');
    d.className = 'line space';
    chat.appendChild(d);
    r();
  }, delay));
}

async function boot() {
  await addLine('initializing expo...', 'dim', 100);
  await addLine('sgs.1 core loaded', 'dim', 220);
  await addLine('ready.', 'green', 360);
  await gap(420);
  inp.focus();
}

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && inp.value.trim() && !busy) {
    const txt = inp.value.trim();
    inp.value = '';
    send(txt);
  }
});

function send(text) {
  if (busy) return;
  busy = true;
  const lower = text.toLowerCase();
  addLine('expo ~ $ ' + text, 'user');
  gap();

  if (lower.includes('who are you') || lower.includes('who r you')) {
    whoAreYou().then(() => busy = false);
  } else if (lower.includes('play') || lower.includes('song') || lower.includes('music') || lower.includes('favourite')) {
    playSong().then(() => busy = false);
  } else if (lower.includes('hack') || lower.includes('trace') || lower.includes('locate') || lower.includes('track') || lower.includes('ip') || lower.includes('phone')) {
    traceDevice().then(() => busy = false);
  } else if (lower.includes('web') || lower.includes('dhop') || lower.includes('shop') || lower.includes('page')) {
    buildPage().then(() => busy = false);
  } else {
    addLine('unknown command.', 'muted', 200).then(() => { gap(300); busy = false; });
  }
}

async function whoAreYou() {
  await addLine("i'm expo.", 'hi', 200);
  await addLine('built on the sgs.1 architecture.', 'normal', 380);
  await gap(460);
  await addLine('designation  →  experimental predictive oracle', 'muted', 540);
  await addLine('build        →  sgs.1 / neuro-core v4.7.2', 'muted', 680);
  await addLine('origin       →  sgs labs', 'muted', 820);
  await addLine('status       →  active', 'green', 960);
  await gap(1040);
}

async function playSong() {
  const steps = [
    [150,  'connecting...'],
    [300,  'loading preference profile...'],
    [450,  'scanning listening history...'],
    [600,  'connecting to spotify api...'],
    [750,  'analyzing top tracks...'],
    [900,  'match found  →  99.4% confidence'],
    [1050, 'buffering stream...'],
  ];
  for (const [d, t] of steps) await addLine(t, 'muted', d);
  await gap(1180);
  await addLine('▶  now playing', 'green', 1260);
  await gap(1360);
  await addLine('song      →  Jo Ishq Hua', 'hi', 1440);
  await addLine('source    →  spotify for developers', 'muted', 1580);
  await addLine('match     →  top favourite', 'muted', 1720);
  await addLine('status    →  streaming', 'green', 1860);
  await gap(1940);
}

async function traceDevice() {
  const steps = [
    [150,  'initializing trace protocol...'],
    [300,  'pinging sgs network relay...'],
    [450,  'routing through proxy chain...'],
    [600,  'node 1  →  frankfurt  ✓'],
    [750,  'node 2  →  singapore  ✓'],
    [900,  'node 3  →  mumbai     ✓'],
    [1050, 'bypassing standard firewall layer...'],
    [1200, 'triangulating signal source...'],
    [1350, 'cross-referencing cell tower data...'],
    [1500, 'locking coordinates...'],
    [1650, 'device fingerprint matched.'],
  ];
  for (const [d, t] of steps) await addLine(t, 'muted', d);
  await gap(1780);
  await addLine('trace complete.', 'green', 1860);
  await gap(1960);
  await addLine('device        →  android / snapdragon', 'hi', 2040);
  await addLine('network       →  jio 5g', 'normal', 2180);
  await addLine('isp           →  reliance jio ltd.', 'normal', 2320);
  await addLine('region        →  india', 'normal', 2460);
  await addLine('city          →  detected', 'normal', 2600);
  await addLine('ip (masked)   →  49.36.***.***', 'blue', 2740);
  await addLine('status        →  online', 'green', 2880);
  await gap(2980);
  await addLine('full coordinates locked — sgs.h restricts precise output.', 'amber', 3060);
  await gap(3160);
}

async function buildPage() {
  const steps = [
    [150,  'initializing webbuilder...'],
    [300,  'parsing dhop parameters...'],
    [450,  'generating html structure...'],
    [600,  'composing css design system...'],
    [750,  'adding js interactions...'],
    [900,  'build complete  →  0 errors'],
    [1050, 'packaging file...'],
  ];
  for (const [d, t] of steps) await addLine(t, 'muted', d);

  const html = shopHTML();
  const blob = new Blob([html], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);

  await gap(1180);
  await addLine('done. your file is ready.', 'green', 1260);
  await gap(1360);

  setTimeout(() => {
    const d = document.createElement('div');
    d.className = 'line blue';
    d.innerHTML = 'dhop-shop.html  →  <a href="' + url + '" download="dhop-shop.html" style="color:#5a80b0;text-underline-offset:3px;">[ click to download ]</a>';
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
  }, 1440);

  await gap(1520);
}

function shopHTML() {
return `<!DOCTYPE html>

</style>
</head>

<script>
const products = [
  {n:'Oversized Hoodie',t:'Apparel',p:'₹1,899',e:'🧥',d:'380gsm heavyweight fleece. Drop-shoulder silhouette with kangaroo pocket. Garment-dyed finish.',tag:'New'},
  {n:'Classic Tee',t:'Apparel',p:'₹799',e:'👕',d:'220gsm organic cotton. Boxy relaxed fit. Pre-shrunk. Available in 6 washed tones.',tag:''},
  {n:'Cargo Pants',t:'Apparel',p:'₹2,499',e:'👖',d:'6-pocket utility cargo. Relaxed tapered leg. YKK zippers. Ripstop nylon blend.',tag:'Popular'},
  {n:'Coach Jacket',t:'Apparel',p:'₹2,999',e:'🥋',d:'Lightweight nylon shell. Contrast lining. Embroidered DHOP chest logo.',tag:'New'},
  {n:'Runner Slides',t:'Footwear',p:'₹999',e:'🩴',d:'Contoured EVA footbed. 3cm platform. Anti-slip outsole. Adjustable strap.',tag:''},
  {n:'Structured Cap',t:'Accessories',p:'₹599',e:'🧢',d:'6-panel structured fit. Tonal embroidery. Adjustable back strap. One size.',tag:''},
  {n:'Canvas Tote',t:'Accessories',p:'₹449',e:'👜',d:'16oz waxed canvas. Interior zip pocket. Leather patch detail. 18L capacity.',tag:''},
  {n:'Ribbed Socks 3pk',t:'Apparel',p:'₹349',e:'🧦',d:'Mid-calf ribbed cut. 80% combed cotton. DHOP cuff embroidery.',tag:''},
  {n:'Bucket Hat',t:'Accessories',p:'₹699',e:'🎩',d:'Reversible design. Packable brim. Cotton twill with waterproof coating.',tag:'New'},
  {n:'Bomber Jacket',t:'Apparel',p:'₹3,499',e:'🧤',d:'Satin-finish shell. Ribbed cuffs and hem. Embroidered back graphic.',tag:'Limited'},
  {n:'Crossbody Bag',t:'Accessories',p:'₹1,199',e:'🎒',d:'Nylon shell with padded strap. Two-compartment design. D-ring attachment.',tag:''},
  {n:'Low Sneakers',t:'Footwear',p:'₹2,199',e:'👟',d:'Vulcanized sole. Canvas upper. Suede toe cap. DHOP co-branded insole.',tag:'Popular'},
];

let cartCount = 0;
let currentFilter = 'all';

function renderGrid(filter) {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  const filtered = filter === 'all' ? products : products.filter(p => p.t === filter);
  filtered.forEach((p, i) => {
    const idx = products.indexOf(p);
    const c = document.createElement('div');
    c.className = 'card';
    c.innerHTML = `
      <div class="card-img">
        ${p.tag ? `<div class="card-tag">${p.tag}</div>` : ''}
        <span style="font-size:72px">${p.e}</span>
        <div class="card-overlay"><button class="quick-add" onclick="event.stopPropagation();quickAdd(${idx})">Quick Add</button></div>
      </div>
      <div class="card-info">
        <div class="card-name">${p.n}</div>
        <div class="card-type">${p.t}</div>
        <div class="card-foot">
          <div class="price">${p.p}</div>
          <div class="rating">★★★★★</div>
        </div>
      </div>`;
    c.addEventListener('click', () => openModal(idx));
    g.appendChild(c);
  });
}

function filterProducts(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(type);
}

function openModal(i) {
  const p = products[i];
  document.getElementById('mImg').textContent = p.e;
  document.getElementById('mTag').textContent = p.t;
  document.getElementById('mName').textContent = p.n;
  document.getElementById('mPrice').textContent = p.p;
  document.getElementById('mDesc').textContent = p.d;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function selSize(btn) {
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
}

function addCart() {
  closeModal();
  cartCount++;
  document.getElementById('cartBtn').textContent = `Bag (${cartCount})`;
  showToast('Added to bag');
}

function quickAdd(i) {
  cartCount++;
  document.getElementById('cartBtn').textContent = `Bag (${cartCount})`;
  showToast(products[i].n + ' added');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

renderGrid('all');
</script>
</body>
</html>`;
}

boot();
</script>
