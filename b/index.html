<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Link Share</title>
<link href="https://fonts.googleapis.com/css2?family=CircularStd:wght@400;500;700&family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: #6b8fa3;
  font-family: 'Figtree', -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 60px 24px 120px;
  position: relative;
  overflow-x: hidden;
}

/* ── INPUT UI (top, minimal) ── */
.input-area {
  width: 100%;
  max-width: 360px;
  margin-bottom: 32px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.url-row {
  display: flex;
  background: rgba(0,0,0,0.25);
  border-radius: 50px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
}

.url-row input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 14px 18px;
  font-size: 14px;
  color: #fff;
  font-family: inherit;
}
.url-row input::placeholder { color: rgba(255,255,255,0.4); }

.url-row button {
  background: rgba(255,255,255,0.15);
  border: none;
  padding: 14px 20px;
  color: #fff;
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
}
.url-row button:active { background: rgba(255,255,255,0.25); }

.title-row {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50px;
  padding: 11px 18px;
  font-size: 13px;
  color: #fff;
  font-family: inherit;
  outline: none;
  backdrop-filter: blur(10px);
}
.title-row::placeholder { color: rgba(255,255,255,0.35); }

/* ── LOADING ── */
#loading {
  display: none;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}
#loading.on { display: block; animation: fade 0.9s ease infinite; }
@keyframes fade { 0%,100%{opacity:.3} 50%{opacity:1} }

/* ══════════════════════════════════════
   THE CARD — pixel-perfect Spotify card
   ══════════════════════════════════════ */
#card {
  display: none;
  width: 100%;
  max-width: 360px;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  animation: popUp 0.35s cubic-bezier(.22,1,.36,1) both;
}
#card.on { display: flex; }
@keyframes popUp { from{opacity:0;transform:scale(0.94) translateY(16px)} to{opacity:1;transform:none} }

/* The dark card itself */
.spotify-card {
  width: 100%;
  background: #1e2a30;
  border-radius: 14px;
  overflow: hidden;
  box-shadow:
    0 2px 8px rgba(0,0,0,0.3),
    0 8px 24px rgba(0,0,0,0.25),
    0 0 0 1px rgba(255,255,255,0.05);
}

/* Square image area — like album art */
.card-image-wrap {
  width: 100%;
  aspect-ratio: 1 / 1;
  position: relative;
  overflow: hidden;
  background: #111;
}

/* The actual site image / favicon shown large */
.card-image-wrap .site-art {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Fallback art — icon centered on dark bg */
.card-image-wrap .art-fallback {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  background: linear-gradient(160deg, #1a2a35 0%, #0d1a20 100%);
}

.card-image-wrap .art-fallback img {
  width: 80px;
  height: 80px;
  object-fit: contain;
  border-radius: 12px;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
}
.card-image-wrap .art-fallback .big-emoji {
  font-size: 72px;
  line-height: 1;
  filter: drop-shadow(0 4px 20px rgba(0,0,0,0.4));
}

/* Card text section */
.card-info {
  padding: 14px 16px 16px;
  background: #1e2a30;
}

.card-info .main-title {
  font-size: 18px;
  font-weight: 800;
  color: #ffffff;
  line-height: 1.2;
  margin-bottom: 4px;
  letter-spacing: -0.2px;
}

.card-info .sub-title {
  font-size: 14px;
  font-weight: 400;
  color: #8a9ea8;
  margin-bottom: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Site logo row — like the Spotify logo at bottom */
.card-brand {
  display: flex;
  align-items: center;
  gap: 7px;
}

.brand-logo {
  width: 22px;
  height: 22px;
  object-fit: contain;
  border-radius: 4px;
  flex-shrink: 0;
}

.brand-emoji {
  font-size: 18px;
  flex-shrink: 0;
  line-height: 1;
}

.brand-name {
  font-size: 14px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: 0.1px;
}

/* ══════════════════════════════════════
   BOTTOM PILL BUTTON — "Spotify ›"
   exactly like in the screenshot
   ══════════════════════════════════════ */
.link-pill {
  width: 100%;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50px;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
}
.link-pill:active { background: rgba(0,0,0,0.35); }

/* Paperclip icon */
.pill-clip {
  width: 22px;
  height: 22px;
  opacity: 0.9;
  flex-shrink: 0;
}

.pill-text {
  flex: 1;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.1px;
}

.pill-arrow {
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  font-weight: 400;
}

/* ── EXTRA ACTIONS (subtle) ── */
.extra-btns {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: 360px;
}

.extra-btn {
  flex: 1;
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50px;
  padding: 12px;
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  font-family: inherit;
  backdrop-filter: blur(10px);
  transition: background 0.15s;
}
.extra-btn:active { background: rgba(0,0,0,0.35); }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  border-radius: 50px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  z-index: 999;
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- INPUT -->
<div class="input-area">
  <div class="url-row">
    <input id="urlIn" type="url" placeholder="Paste any link..." autocomplete="off" spellcheck="false">
    <button onclick="generate()">Go</button>
  </div>
  <input class="title-row" id="titleIn" type="text" placeholder="Title (optional)">
</div>

<div id="loading">Loading preview...</div>

<!-- THE CARD -->
<div id="card">

  <!-- Spotify-style dark card -->
  <div class="spotify-card">

    <!-- Square image / art area -->
    <div class="card-image-wrap" id="artWrap">
      <div class="art-fallback" id="artFallback">
        <span class="big-emoji" id="artEmoji">🔗</span>
      </div>
    </div>

    <!-- Title + subtitle + brand -->
    <div class="card-info">
      <div class="main-title" id="cardTitle">Title</div>
      <div class="sub-title" id="cardSub">website.com</div>
      <div class="card-brand">
        <span id="brandIcon" style="font-size:18px;line-height:1">🔗</span>
        <span class="brand-name" id="brandName">Website</span>
      </div>
    </div>

  </div>

  <!-- THE PILL BUTTON — "Spotify ›" style -->
  <div class="link-pill" id="pillBtn" onclick="openUrl()">
    <!-- paperclip SVG -->
    <svg class="pill-clip" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
    </svg>
    <span class="pill-text" id="pillText">Website</span>
    <span class="pill-arrow">›</span>
  </div>

  <!-- extra actions -->
  <div class="extra-btns">
    <button class="extra-btn" onclick="copyUrl()">📋 Copy Link</button>
    <button class="extra-btn" onclick="nativeShare()">⬆ Share</button>
  </div>

</div>

<div id="toast"></div>

<script>
let G = { url:'', domain:'', title:'', favicon:'', emoji:'' };

const EMOJIS = {
  spotify:'🎵', youtube:'▶️', 'youtu.be':'▶️', instagram:'📸',
  tiktok:'🎵', twitter:'🐦', 'x.com':'✖️', netflix:'🎬',
  soundcloud:'🎧', apple:'🍎', github:'💻', reddit:'👾',
  facebook:'👤', linkedin:'💼', amazon:'📦', discord:'🎮',
  whatsapp:'💬', telegram:'✈️', twitch:'🎮', pinterest:'📌',
  snapchat:'👻', google:'🔍', maps:'🗺️', news:'📰',
};

function getDomain(u) {
  try { return new URL(u).hostname.replace('www.',''); } catch { return u; }
}
function getFavicon(d) {
  return `https://www.google.com/s2/favicons?domain=${d}&sz=128`;
}
function getEmoji(d) {
  for (const [k,v] of Object.entries(EMOJIS)) if(d.includes(k)) return v;
  return '🌐';
}
function cleanDomainName(d) {
  // "open.spotify.com" → "Spotify", "github.com" → "GitHub" etc
  const special = {
    'spotify':'Spotify','youtube':'YouTube','instagram':'Instagram',
    'tiktok':'TikTok','twitter':'Twitter','x.com':'X','netflix':'Netflix',
    'soundcloud':'SoundCloud','apple':'Apple','github':'GitHub',
    'reddit':'Reddit','facebook':'Facebook','linkedin':'LinkedIn',
    'amazon':'Amazon','discord':'Discord','whatsapp':'WhatsApp',
    'telegram':'Telegram','twitch':'Twitch','pinterest':'Pinterest',
    'snapchat':'Snapchat','google':'Google',
  };
  for (const [k,v] of Object.entries(special)) if(d.includes(k)) return v;
  const base = d.split('.')[0];
  return base.charAt(0).toUpperCase() + base.slice(1);
}
function guessTitle(url, domain) {
  try {
    const parts = new URL(url).pathname.split('/').filter(Boolean);
    if (parts.length) {
      const t = parts[parts.length-1]
        .replace(/[-_+]/g,' ')
        .replace(/\.\w+$/,'')
        .replace(/\b\w/g, c => c.toUpperCase());
      if (t.length > 1 && t.length < 60) return t;
    }
  } catch {}
  return cleanDomainName(domain);
}

async function generate() {
  const raw = document.getElementById('urlIn').value.trim();
  if (!raw) { showToast('Paste a link first'); return; }
  let url = raw;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  try { new URL(url); } catch { showToast('Not a valid link'); return; }

  document.getElementById('urlIn').value = url;
  document.getElementById('loading').classList.add('on');
  document.getElementById('card').classList.remove('on');

  await new Promise(r => setTimeout(r, 500));

  const domain   = getDomain(url);
  const emoji    = getEmoji(domain);
  const siteName = cleanDomainName(domain);
  const title    = document.getElementById('titleIn').value.trim() || guessTitle(url, domain);
  const favicon  = getFavicon(domain);

  G = { url, domain, title, favicon, emoji, siteName };

  // ── Fill card ──
  document.getElementById('cardTitle').textContent = title;
  document.getElementById('cardSub').textContent   = domain;
  document.getElementById('pillText').textContent  = siteName;

  // Art area — try to use favicon as the "album art" centered on dark bg
  const artWrap = document.getElementById('artWrap');
  const fallback = document.getElementById('artFallback');
  document.getElementById('artEmoji').textContent = emoji;

  // Load favicon, if it loads show it large; else keep emoji
  const testImg = new Image();
  testImg.src = favicon;
  testImg.onload = () => {
    fallback.innerHTML = `<img src="${favicon}" style="width:100px;height:100px;object-fit:contain;border-radius:16px;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.6))">`;
  };
  testImg.onerror = () => {
    fallback.innerHTML = `<span class="big-emoji">${emoji}</span>`;
  };

  // Brand row
  const brandIcon = document.getElementById('brandIcon');
  const bImg = new Image();
  bImg.src = favicon;
  bImg.onload = () => {
    brandIcon.innerHTML = '';
    const img = document.createElement('img');
    img.src = favicon;
    img.className = 'brand-logo';
    brandIcon.replaceWith(img);
    img.id = 'brandIcon';
  };
  bImg.onerror = () => {
    brandIcon.textContent = emoji;
    brandIcon.style.fontSize = '18px';
  };
  document.getElementById('brandName').textContent = siteName;

  document.getElementById('loading').classList.remove('on');
  document.getElementById('card').classList.add('on');
}

function openUrl() { if (G.url) window.open(G.url,'_blank'); }

function copyUrl() {
  if (!G.url) return;
  navigator.clipboard.writeText(G.url)
    .then(()=> showToast('✅ Link copied!'))
    .catch(()=> showToast('Could not copy'));
}

function nativeShare() {
  if (!G.url) return;
  if (navigator.share) {
    navigator.share({ title: G.title, url: G.url }).catch(()=>{});
  } else { copyUrl(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(()=> t.classList.remove('show'), 2400);
}

// Auto-generate on paste
document.getElementById('urlIn').addEventListener('paste', ()=> setTimeout(generate, 100));
document.getElementById('urlIn').addEventListener('keydown', e => { if(e.key==='Enter') generate(); });
</script>
</body>
</html>
